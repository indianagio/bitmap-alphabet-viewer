<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bitmap Alphabet Viewer</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
  }
  h1 { margin: 0 0 12px; font-size: 20px; }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    background: #1b1b1b;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 18px;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  input[type="number"] {
    width: 70px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
  }
  input[type="text"] {
    width: 60px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 2px solid #3b82f6;
    background: #222;
    color: #fff;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
    letter-spacing: 0.05em;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
  }
  input[type="range"] {
    width: 140px;
    accent-color: #3b82f6;
  }
  input[type="file"] { color: #ddd; }
  button {
    padding: 8px 14px;
    border: 0;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: #2563eb; }
  .separator {
    width: 1px;
    height: 32px;
    background: #333;
    margin: 0 4px;
  }
  .note {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .glyphs {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .card {
    background: #1b1b1b;
    border-radius: 10px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lbl {
    font-size: 13px;
    margin-bottom: 6px;
    color: #ccc;
  }
  .wrap {
    position: relative;
    display: block;
  }
  canvas.glyph {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #444;
  }
  svg.grid-ov {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  .mode-tabs {
    display: flex;
    gap: 0;
    background: #222;
    border-radius: 8px;
    padding: 3px;
  }
  .mode-tab {
    padding: 5px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, color 0.15s;
  }
  .mode-tab.active {
    background: #3b82f6;
    color: #fff;
  }
</style>
</head>
<body>
<h1>Bitmap Alphabet Viewer</h1>

<div class="controls">
  <!-- Modalità -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabSingle" onclick="setMode('single')">Singolo</button>
    <button class="mode-tab" id="tabAll" onclick="setMode('all')">Tutti</button>
  </div>

  <div class="separator"></div>

  <!-- Carattere singolo -->
  <label id="singleCharLabel">Carattere
    <input type="text" id="singleChar" value="A" maxlength="1" title="Scrivi un carattere o cifra" />
  </label>

  <div class="separator"></div>

  <!-- Dimensioni cella -->
  <label>Cella W
    <input type="number" id="cellW" value="12" min="4" max="64" />
  </label>
  <label>Cella H
    <input type="number" id="cellH" value="16" min="4" max="64" />
  </label>

  <div class="separator"></div>

  <label>Font file
    <input type="file" id="fontFile" accept=".ttf,.otf,.woff,.woff2" />
  </label>

  <label>Font size
    <input type="number" id="fontSize" value="15" min="6" max="48" />
  </label>

  <label>Offset X
    <input type="number" id="offsetX" value="0" min="-16" max="16" />
  </label>

  <label>Offset Y
    <input type="number" id="offsetY" value="0" min="-16" max="16" />
  </label>

  <label>Soglia alpha
    <input type="number" id="threshold" value="80" min="0" max="255" />
  </label>

  <label>Scala <span id="scaleVal">20</span>x
    <input type="range" id="scaleSlider" min="5" max="60" value="20" step="1" />
  </label>

  <button id="renderBtn">Render</button>
</div>

<div class="note" id="note">Cella logica 12×16 px — scala 20x — griglia pixel visibile.</div>

<div id="glyphs" class="glyphs"></div>

<script>
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let currentMode = "single"; // "single" | "all"

const glyphsEl       = document.getElementById("glyphs");
const fontFileInput  = document.getElementById("fontFile");
const fontSizeInput  = document.getElementById("fontSize");
const offsetXInput   = document.getElementById("offsetX");
const offsetYInput   = document.getElementById("offsetY");
const thresholdInput = document.getElementById("threshold");
const scaleSlider    = document.getElementById("scaleSlider");
const scaleVal       = document.getElementById("scaleVal");
const noteEl         = document.getElementById("note");
const renderBtn      = document.getElementById("renderBtn");
const singleCharInput= document.getElementById("singleChar");
const cellWInput     = document.getElementById("cellW");
const cellHInput     = document.getElementById("cellH");

let SCALE = parseInt(scaleSlider.value, 10);

function getCellW() { return Math.max(1, parseInt(cellWInput.value, 10) || 12); }
function getCellH() { return Math.max(1, parseInt(cellHInput.value, 10) || 16); }

scaleSlider.addEventListener("input", () => {
  SCALE = parseInt(scaleSlider.value, 10);
  scaleVal.textContent = SCALE;
  updateNote();
});

function updateNote() {
  const cw = getCellW();
  const ch = getCellH();
  noteEl.textContent = `Cella logica ${cw}×${ch} px — scala ${SCALE}x — griglia pixel visibile.`;
}

cellWInput.addEventListener("input", updateNote);
cellHInput.addEventListener("input", updateNote);

function setMode(mode) {
  currentMode = mode;
  document.getElementById("tabSingle").classList.toggle("active", mode === "single");
  document.getElementById("tabAll").classList.toggle("active", mode === "all");
  document.getElementById("singleCharLabel").style.opacity = mode === "single" ? "1" : "0.4";
  document.getElementById("singleCharLabel").style.pointerEvents = mode === "single" ? "" : "none";
}

let currentFontFamily = "monospace";
let currentFontFace   = null;

async function loadFontFromFile(file) {
  if (!file) return;
  const fontName = "UserBitmapFont_" + Date.now();
  const url = URL.createObjectURL(file);
  if (currentFontFace) {
    try { document.fonts.delete(currentFontFace); } catch(e) {}
  }
  const ff = new FontFace(fontName, `url(${url})`);
  await ff.load();
  document.fonts.add(ff);
  currentFontFace   = ff;
  currentFontFamily = fontName;
}

function glyphToBitmap(char, fontSize, threshold) {
  const CELL_W = getCellW();
  const CELL_H = getCellH();
  const TMP_SCALE = 16;
  const TW = CELL_W * TMP_SCALE + 20;
  const TH = CELL_H * TMP_SCALE + 20;

  const tmp = document.createElement("canvas");
  tmp.width  = TW;
  tmp.height = TH;
  const tctx = tmp.getContext("2d", { willReadFrequently: true });
  tctx.clearRect(0, 0, TW, TH);
  tctx.fillStyle = "#fff";
  tctx.textBaseline = "top";
  tctx.textAlign    = "left";
  tctx.font = `${fontSize * TMP_SCALE}px "${currentFontFamily}", monospace`;
  tctx.fillText(char, 0, 0);

  const ld = tctx.getImageData(0, 0, TW, TH).data;
  let lx0=TW, lx1=0, ly0=TH, ly1=0;
  for (let y=0; y<TH; y++) {
    for (let x=0; x<TW; x++) {
      if (ld[(y*TW+x)*4+3] > 10) {
        if(x<lx0)lx0=x; if(x>lx1)lx1=x;
        if(y<ly0)ly0=y; if(y>ly1)ly1=y;
      }
    }
  }

  const src = document.createElement("canvas");
  src.width  = CELL_W;
  src.height = CELL_H;
  const sctx = src.getContext("2d", { willReadFrequently: true });
  sctx.clearRect(0, 0, CELL_W, CELL_H);

  if (lx0 <= lx1 && ly0 <= ly1) {
    const inkW = lx1 - lx0 + 1;
    const inkH = ly1 - ly0 + 1;
    const aspect = inkW / inkH;
    const cellAspect = CELL_W / CELL_H;
    let dstW, dstH, dstX, dstY;
    if (aspect >= cellAspect) {
      dstW = CELL_W;
      dstH = Math.round(CELL_W / aspect);
    } else {
      dstH = CELL_H;
      dstW = Math.round(CELL_H * aspect);
    }
    dstX = Math.floor((CELL_W - dstW) / 2);
    dstY = Math.floor((CELL_H - dstH) / 2);
    sctx.drawImage(tmp, lx0, ly0, inkW, inkH, dstX, dstY, dstW, dstH);
  }

  const img  = sctx.getImageData(0, 0, CELL_W, CELL_H);
  const data = img.data;
  for (let i=0; i<data.length; i+=4) {
    const on = data[i+3] >= threshold ? 255 : 0;
    data[i]=on; data[i+1]=on; data[i+2]=on; data[i+3]=255;
  }
  sctx.putImageData(img, 0, 0);
  return src;
}

function buildGridSVG(W, H, scale, cellW, cellH) {
  const ns  = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("width",  W);
  svg.setAttribute("height", H);
  svg.setAttribute("class",  "grid-ov");
  const mk = (x1,y1,x2,y2) => {
    const l = document.createElementNS(ns, "line");
    l.setAttribute("x1",x1); l.setAttribute("y1",y1);
    l.setAttribute("x2",x2); l.setAttribute("y2",y2);
    l.setAttribute("stroke", "#2d2d2d");
    l.setAttribute("stroke-width", "1");
    svg.appendChild(l);
  };
  for (let x=0; x<=cellW; x++) mk(x*scale, 0, x*scale, H);
  for (let y=0; y<=cellH; y++) mk(0, y*scale, W, y*scale);
  return svg;
}

function drawAll() {
  const CELL_W = getCellW();
  const CELL_H = getCellH();

  glyphsEl.innerHTML = "";
  const W = CELL_W * SCALE;
  const H = CELL_H * SCALE;

  const fontSize  = parseInt(fontSizeInput.value,  10);
  const offsetX   = parseInt(offsetXInput.value,   10);
  const offsetY   = parseInt(offsetYInput.value,   10);
  const threshold = parseInt(thresholdInput.value, 10);

  const chars = currentMode === "single"
    ? [singleCharInput.value.trim()[0] || "A"]
    : [...alphabet];

  for (const ch of chars) {
    const bitmap = glyphToBitmap(ch, fontSize, threshold);

    let finalSrc = bitmap;
    if (offsetX !== 0 || offsetY !== 0) {
      const c2 = document.createElement("canvas");
      c2.width=CELL_W; c2.height=CELL_H;
      const c2ctx = c2.getContext("2d");
      c2ctx.drawImage(bitmap, offsetX, offsetY);
      finalSrc = c2;
    }

    const out = document.createElement("canvas");
    out.width=W; out.height=H;
    const octx = out.getContext("2d");
    octx.imageSmoothingEnabled = false;
    octx.drawImage(finalSrc, 0, 0, W, H);
    out.className = "glyph";

    const wrap = document.createElement("div");
    wrap.className = "wrap";
    wrap.style.width  = W+"px";
    wrap.style.height = H+"px";
    wrap.appendChild(out);
    wrap.appendChild(buildGridSVG(W, H, SCALE, CELL_W, CELL_H));

    const lbl = document.createElement("div");
    lbl.className = "lbl";
    lbl.textContent = `'${ch}' — ${CELL_W}×${CELL_H}px`;

    const card = document.createElement("div");
    card.className = "card";
    card.appendChild(lbl);
    card.appendChild(wrap);
    glyphsEl.appendChild(card);
  }

  updateNote();
}

// render automatico quando si cambia il carattere
singleCharInput.addEventListener("input", () => {
  if (currentMode === "single" && singleCharInput.value.trim().length > 0) {
    drawAll();
  }
});

// render automatico on Enter
singleCharInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") drawAll();
});

renderBtn.addEventListener("click", async () => {
  const file = fontFileInput.files[0];
  if (file) {
    await loadFontFromFile(file);
    await document.fonts.ready;
  }
  drawAll();
});

drawAll();
</script>
</body>
</html>

<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>12x16 Bitmap Alphabet Viewer</title>
<style>
  :root{
    --cell-w: 12;
    --cell-h: 16;
    --scale: 50;
    --gap: 20px;
    --bg: #111;
    --panel: #1b1b1b;
    --text: #eee;
    --muted: #aaa;
    --pixel-bg: #000;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
  }

  h1 { margin: 0 0 12px; font-size: 20px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    background: var(--panel);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 18px;
  }

  .controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  input[type="number"] {
    width: 80px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
  }

  input[type="file"] { color: #ddd; }

  button {
    padding: 8px 12px;
    border: 0;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
  }

  .note {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  .glyphs {
    display: flex;
    flex-wrap: wrap;
    gap: var(--gap);
  }

  .card {
    background: var(--panel);
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label {
    font-size: 14px;
    margin-bottom: 8px;
    color: #ddd;
    text-align: center;
  }

  .canvas-wrap {
    position: relative;
    display: block;
    /* exact pixel size set by JS */
  }

  canvas.glyph {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #555;
  }

  /* SVG grid overlay sits on top */
  svg.grid-overlay {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
  <h1>Bitmap Alphabet Viewer 12×16</h1>

  <div class="controls">
    <label>Font file
      <input type="file" id="fontFile" accept=".ttf,.otf,.woff,.woff2" />
    </label>

    <label>Font size
      <input type="number" id="fontSize" value="15" min="6" max="32" />
    </label>

    <label>Offset X
      <input type="number" id="offsetX" value="0" min="-6" max="6" />
    </label>

    <label>Offset Y
      <input type="number" id="offsetY" value="0" min="-8" max="8" />
    </label>

    <label>Soglia alpha
      <input type="number" id="threshold" value="80" min="0" max="255" />
    </label>

    <button id="renderBtn">Render</button>
  </div>

  <div class="note">
    Cella logica 12×16 px — visualizzazione 50x con griglia pixel visibile.
  </div>

  <div id="glyphs" class="glyphs"></div>

<script>
const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
const CELL_W = 12;
const CELL_H = 16;
const SCALE  = 50;

const W = CELL_W * SCALE; // 600px
const H = CELL_H * SCALE; // 800px

const glyphsEl     = document.getElementById("glyphs");
const fontFileInput = document.getElementById("fontFile");
const fontSizeInput = document.getElementById("fontSize");
const offsetXInput  = document.getElementById("offsetX");
const offsetYInput  = document.getElementById("offsetY");
const thresholdInput= document.getElementById("threshold");
const renderBtn     = document.getElementById("renderBtn");

let currentFontFamily = "monospace";
let currentFontFace   = null;

async function loadFontFromFile(file) {
  if (!file) return;
  const fontName = "UserBitmapFont_" + Date.now();
  const url = URL.createObjectURL(file);
  if (currentFontFace) {
    try { document.fonts.delete(currentFontFace); } catch(e) {}
  }
  const ff = new FontFace(fontName, `url(${url})`);
  await ff.load();
  document.fonts.add(ff);
  currentFontFace   = ff;
  currentFontFamily = fontName;
}

/* Build a 1×1 canvas to measure actual ink bounding box */
function measureGlyph(char, fontSize) {
  const c = document.createElement("canvas");
  c.width  = CELL_W * 4;  // generous temp size
  c.height = CELL_H * 4;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = "#fff";
  ctx.textBaseline = "top";
  ctx.textAlign    = "left";
  ctx.font = `${fontSize}px "${currentFontFamily}", monospace`;
  ctx.fillText(char, 0, 0);
  const d = ctx.getImageData(0, 0, c.width, c.height).data;
  let minX = c.width, maxX = 0, minY = c.height, maxY = 0;
  for (let y = 0; y < c.height; y++) {
    for (let x = 0; x < c.width; x++) {
      const a = d[(y * c.width + x) * 4 + 3];
      if (a > 10) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (minX > maxX) return { w: 0, h: 0, ox: 0, oy: 0 };
  return { w: maxX - minX + 1, h: maxY - minY + 1, ox: minX, oy: minY };
}

function renderGlyph(char, fontSize, offsetX, offsetY, threshold) {
  // --- step 1: measure actual ink bounding box ---
  const m = measureGlyph(char, fontSize);

  // --- step 2: render into CELL_W×CELL_H, scaled to fill the cell ---
  const src = document.createElement("canvas");
  src.width  = CELL_W;
  src.height = CELL_H;
  const sctx = src.getContext("2d", { willReadFrequently: true });
  sctx.clearRect(0, 0, CELL_W, CELL_H);

  if (m.w > 0 && m.h > 0) {
    // draw at large size first
    const tmpSize = fontSize * 8;
    const tmp = document.createElement("canvas");
    tmp.width  = CELL_W * 8 + 20;
    tmp.height = CELL_H * 8 + 20;
    const tctx = tmp.getContext("2d", { willReadFrequently: true });
    tctx.clearRect(0, 0, tmp.width, tmp.height);
    tctx.fillStyle = "#fff";
    tctx.textBaseline = "top";
    tctx.textAlign    = "left";
    tctx.font = `${tmpSize}px "${currentFontFamily}", monospace`;
    tctx.fillText(char, 0, 0);

    // measure at large size
    const ld = tctx.getImageData(0, 0, tmp.width, tmp.height).data;
    let lx0=tmp.width, lx1=0, ly0=tmp.height, ly1=0;
    for (let y=0;y<tmp.height;y++) {
      for (let x=0;x<tmp.width;x++) {
        const a=ld[(y*tmp.width+x)*4+3];
        if (a>10){
          if(x<lx0)lx0=x; if(x>lx1)lx1=x;
          if(y<ly0)ly0=y; if(y>ly1)ly1=y;
        }
      }
    }

    if (lx0 <= lx1 && ly0 <= ly1) {
      const inkW = lx1 - lx0 + 1;
      const inkH = ly1 - ly0 + 1;
      // scale ink to fill CELL_W x CELL_H exactly
      sctx.save();
      sctx.scale(CELL_W / inkW, CELL_H / inkH);
      sctx.drawImage(tmp, lx0, ly0, inkW, inkH, 0, 0, inkW, inkH);
      sctx.restore();
    }
  }

  // apply offset
  if (offsetX !== 0 || offsetY !== 0) {
    const snap = document.createElement("canvas");
    snap.width = CELL_W; snap.height = CELL_H;
    const snctx = snap.getContext("2d");
    snctx.drawImage(src, 0, 0);
    sctx.clearRect(0, 0, CELL_W, CELL_H);
    sctx.drawImage(snap, offsetX, offsetY);
  }

  // threshold binarise
  const img = sctx.getImageData(0, 0, CELL_W, CELL_H);
  const data = img.data;
  for (let i = 0; i < data.length; i += 4) {
    const on = data[i+3] >= threshold ? 255 : 0;
    data[i]=on; data[i+1]=on; data[i+2]=on; data[i+3]=255;
  }
  sctx.putImageData(img, 0, 0);

  // --- step 3: scale up to SCALE ---
  const out = document.createElement("canvas");
  out.width  = W;
  out.height = H;
  const octx = out.getContext("2d");
  octx.imageSmoothingEnabled = false;
  octx.drawImage(src, 0, 0, W, H);

  return out;
}

function buildGridSVG() {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("width",  W);
  svg.setAttribute("height", H);
  svg.setAttribute("class",  "grid-overlay");

  // vertical lines
  for (let x = 0; x <= CELL_W; x++) {
    const line = document.createElementNS(ns, "line");
    line.setAttribute("x1", x * SCALE);
    line.setAttribute("y1", 0);
    line.setAttribute("x2", x * SCALE);
    line.setAttribute("y2", H);
    line.setAttribute("stroke", "#333");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }
  // horizontal lines
  for (let y = 0; y <= CELL_H; y++) {
    const line = document.createElementNS(ns, "line");
    line.setAttribute("x1", 0);
    line.setAttribute("y1", y * SCALE);
    line.setAttribute("x2", W);
    line.setAttribute("y2", y * SCALE);
    line.setAttribute("stroke", "#333");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }
  return svg;
}

function drawAll() {
  glyphsEl.innerHTML = "";

  const fontSize  = parseInt(fontSizeInput.value, 10);
  const offsetX   = parseInt(offsetXInput.value,  10);
  const offsetY   = parseInt(offsetYInput.value,  10);
  const threshold = parseInt(thresholdInput.value, 10);

  for (const ch of alphabet) {
    const card = document.createElement("div");
    card.className = "card";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = ch;

    const canvas = renderGlyph(ch, fontSize, offsetX, offsetY, threshold);
    canvas.className = "glyph";

    const wrap = document.createElement("div");
    wrap.className = "canvas-wrap";
    wrap.style.width  = W + "px";
    wrap.style.height = H + "px";
    wrap.appendChild(canvas);
    wrap.appendChild(buildGridSVG());

    card.appendChild(label);
    card.appendChild(wrap);
    glyphsEl.appendChild(card);
  }
}

renderBtn.addEventListener("click", async () => {
  const file = fontFileInput.files[0];
  if (file) {
    await loadFontFromFile(file);
    await document.fonts.ready;
  }
  drawAll();
});

drawAll();
</script>
</body>
</html>
